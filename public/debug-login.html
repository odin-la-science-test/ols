<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Login System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #00ff00;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px #00ff00;
        }

        .section {
            background: #2a2a2a;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #00ff00;
            border-radius: 0.5rem;
        }

        h2 {
            color: #00ffff;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 0.75rem 1.5rem;
            margin: 0.5rem 0.5rem 0.5rem 0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-radius: 0.25rem;
        }

        button:hover {
            background: #00cc00;
        }

        button.danger {
            background: #ff0000;
            color: #fff;
        }

        button.danger:hover {
            background: #cc0000;
        }

        pre {
            background: #000;
            padding: 1rem;
            border-radius: 0.25rem;
            overflow-x: auto;
            margin-top: 1rem;
            border: 1px solid #333;
        }

        .status {
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 0.25rem;
        }

        .status.success {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
        }

        .status.error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ff6666;
        }

        .status.info {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            color: #00ffff;
        }

        input {
            background: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 0.5rem;
            font-family: 'Courier New', monospace;
            margin: 0.5rem 0;
            width: 100%;
            max-width: 400px;
        }

        label {
            display: block;
            margin-top: 1rem;
            color: #00ffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Debug Login System</h1>

        <div class="section">
            <h2>1. Check localStorage</h2>
            <button onclick="checkLocalStorage()">📋 List All Keys</button>
            <button onclick="checkUserProfiles()">👤 Check User Profiles</button>
            <div id="localStorage-output"></div>
        </div>

        <div class="section">
            <h2>2. Create Test Accounts (No Encryption)</h2>
            <button onclick="createSimpleAccounts()">✨ Create Simple Accounts</button>
            <div id="create-output"></div>
        </div>

        <div class="section">
            <h2>3. Test Login</h2>
            <label>Email:</label>
            <input type="text" id="test-email" value="ethan@ols.com" />
            <label>Password:</label>
            <input type="password" id="test-password" value="ethan123" />
            <br><br>
            <button onclick="testLogin()">🔐 Test Login</button>
            <div id="login-output"></div>
        </div>

        <div class="section">
            <h2>4. Clear Data</h2>
            <button class="danger" onclick="clearAll()">🗑️ Clear All localStorage</button>
            <button onclick="clearUserProfiles()">🧹 Clear Only User Profiles</button>
        </div>

        <div class="section">
            <h2>5. Quick Actions</h2>
            <button onclick="window.location.href='/login'">🚀 Go to Login Page</button>
            <button onclick="window.location.href='/reset-accounts.html'">🔄 Go to Reset Page</button>
        </div>
    </div>

    <script>
        function log(message, type = 'info') {
            console.log(message);
        }

        function showOutput(elementId, content, type = 'info') {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="status ${type}">${content}</div>`;
        }

        function checkLocalStorage() {
            const keys = Object.keys(localStorage);
            const output = `
                <div class="status info">
                    <strong>Total keys: ${keys.length}</strong>
                </div>
                <pre>${JSON.stringify(keys, null, 2)}</pre>
            `;
            showOutput('localStorage-output', output);
        }

        function checkUserProfiles() {
            const keys = Object.keys(localStorage).filter(k => k.startsWith('user_profile_'));
            const profiles = {};
            
            keys.forEach(key => {
                try {
                    const value = localStorage.getItem(key);
                    // Try to parse as JSON
                    try {
                        profiles[key] = JSON.parse(value);
                    } catch {
                        profiles[key] = { raw: value.substring(0, 100) + '...' };
                    }
                } catch (e) {
                    profiles[key] = { error: e.message };
                }
            });

            const output = `
                <div class="status info">
                    <strong>User profiles found: ${keys.length}</strong>
                </div>
                <pre>${JSON.stringify(profiles, null, 2)}</pre>
            `;
            showOutput('localStorage-output', output);
        }

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function createSimpleAccounts() {
            const accounts = [
                { email: 'ethan@ols.com', password: 'ethan123', role: 'super_admin', firstName: 'Ethan' },
                { email: 'bastien@ols.com', password: 'bastien123', role: 'super_admin', firstName: 'Bastien' },
                { email: 'issam@ols.com', password: 'issam123', role: 'super_admin', firstName: 'Issam' },
                { email: 'admin', password: 'admin123', role: 'admin', firstName: 'Admin' },
                { email: 'trinity@ols.com', password: 'trinity123', role: 'student', firstName: 'Trinity' }
            ];

            let output = '<div class="status success">Creating accounts...</div>';
            
            for (const account of accounts) {
                const normalizedEmail = account.email.toLowerCase().trim();
                const hashedPassword = await hashPassword(account.password);

                const userProfile = {
                    username: normalizedEmail,
                    email: normalizedEmail,
                    password: hashedPassword,
                    role: account.role,
                    firstName: account.firstName,
                    lastName: 'User',
                    organizationId: `org_test_${Date.now()}`,
                    permissions: account.role === 'super_admin' ? ['all_access'] : ['basic_access'],
                    subscription: {
                        status: 'active',
                        planType: 'full',
                        modules: 'all'
                    },
                    createdAt: new Date().toISOString()
                };

                // Store as plain JSON (no encryption)
                localStorage.setItem(`user_profile_${normalizedEmail}`, JSON.stringify(userProfile));
                output += `<div class="status success">✅ Created: ${account.email} (password hash: ${hashedPassword.substring(0, 16)}...)</div>`;
            }

            showOutput('create-output', output);
        }

        async function testLogin() {
            const email = document.getElementById('test-email').value.toLowerCase().trim();
            const password = document.getElementById('test-password').value;

            let output = `<div class="status info">Testing login for: ${email}</div>`;

            // Get profile
            const profileKey = `user_profile_${email}`;
            const profileStr = localStorage.getItem(profileKey);

            if (!profileStr) {
                output += `<div class="status error">❌ Profile not found for key: ${profileKey}</div>`;
                showOutput('login-output', output);
                return;
            }

            output += `<div class="status success">✅ Profile found</div>`;

            try {
                const profile = JSON.parse(profileStr);
                output += `<pre>${JSON.stringify(profile, null, 2)}</pre>`;

                // Hash the input password
                const hashedInputPassword = await hashPassword(password);
                output += `<div class="status info">Input password hash: ${hashedInputPassword}</div>`;
                output += `<div class="status info">Stored password hash: ${profile.password}</div>`;

                if (profile.password === hashedInputPassword) {
                    output += `<div class="status success">✅ PASSWORD MATCH! Login would succeed.</div>`;
                } else {
                    output += `<div class="status error">❌ PASSWORD MISMATCH! Login would fail.</div>`;
                }
            } catch (e) {
                output += `<div class="status error">❌ Error parsing profile: ${e.message}</div>`;
            }

            showOutput('login-output', output);
        }

        function clearAll() {
            if (confirm('Clear ALL localStorage? This cannot be undone.')) {
                localStorage.clear();
                showOutput('localStorage-output', '<div class="status success">✅ All localStorage cleared</div>');
            }
        }

        function clearUserProfiles() {
            const keys = Object.keys(localStorage).filter(k => k.startsWith('user_profile_'));
            keys.forEach(key => localStorage.removeItem(key));
            showOutput('localStorage-output', `<div class="status success">✅ Cleared ${keys.length} user profiles</div>`);
        }

        // Auto-check on load
        window.addEventListener('load', () => {
            checkLocalStorage();
        });
    </script>
</body>
</html>
