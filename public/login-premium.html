<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Login - Odin La Science</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --success: #10b981;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --glow: rgba(102, 126, 234, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* GPU Acceleration */
        .gpu-accelerated {
            transform: translateZ(0);
            will-change: transform;
            backface-visibility: hidden;
        }

        /* Animated Background */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float-orb 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
            bottom: -10%;
            right: -10%;
            animation-delay: -10s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--success) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            animation-delay: -5s;
        }

        @keyframes float-orb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Login Card */
        .login-card {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            animation: card-enter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes card-enter {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Logo */
        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 8px 32px var(--glow);
            animation: logo-pulse 3s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .logo::before {
            content: '';
            position: absolute;
            inset: -50%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: logo-shine 3s linear infinite;
        }

        @keyframes logo-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 32px var(--glow); }
            50% { transform: scale(1.05); box-shadow: 0 12px 48px var(--glow); }
        }

        @keyframes logo-shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(200%) rotate(45deg); }
        }

        /* Title */
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text) 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.5rem;
            animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.9375rem;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
            box-shadow: 
                0 0 0 4px rgba(102, 126, 234, 0.1),
                0 8px 16px rgba(0, 0, 0, 0.1);
            transform: translateY(-1px);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 16px var(--glow);
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--glow);
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.success {
            background: linear-gradient(135deg, var(--success), #059669);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4);
        }

        .btn.success:hover {
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.5);
        }

        /* Step Indicator */
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .step-dot.active {
            width: 24px;
            border-radius: 4px;
            background: var(--primary);
            box-shadow: 0 0 12px var(--glow);
        }

        /* Success Animation */
        .success-overlay {
            position: fixed;
            inset: 0;
            background: rgba(16, 185, 129, 0.95);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: overlay-enter 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .success-overlay.show {
            display: flex;
        }

        @keyframes overlay-enter {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .success-content {
            text-align: center;
            animation: success-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes success-pop {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .checkmark svg {
            width: 40px;
            height: 40px;
            stroke: var(--success);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: checkmark-draw 0.6s 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes checkmark-draw {
            to { stroke-dashoffset: 0; }
        }

        .success-title {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
        }

        .success-subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .login-card {
                padding: 2rem 1.5rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-canvas">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="login-card gpu-accelerated">
            <!-- Logo -->
            <div class="logo">🔬</div>

            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step-dot active" id="dot1"></div>
                <div class="step-dot" id="dot2"></div>
            </div>

            <!-- Step 1: Credentials -->
            <div id="step1">
                <h1>Bienvenue</h1>
                <p class="subtitle">Connectez-vous à votre compte</p>

                <form onsubmit="goToStep2(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <input 
                                type="email" 
                                id="email" 
                                placeholder="votre.email@ols.com"
                                value="ethan@ols.com"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Mot de passe</label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="••••••••"
                                value="ethan123"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn">
                            Continuer
                        </button>
                    </div>
                </form>
            </div>

            <!-- Step 2: 2FA -->
            <div id="step2" class="hidden">
                <h1>Vérification</h1>
                <p class="subtitle">Entrez votre code de sécurité</p>

                <form onsubmit="login(event)">
                    <div class="form-group">
                        <label>Code de sécurité</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="code" 
                                placeholder="1234"
                                maxlength="4"
                                style="text-align: center; font-size: 1.5rem; letter-spacing: 0.5rem;"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn success">
                            Se connecter
                        </button>
                    </div>

                    <div class="form-group">
                        <button type="button" class="btn" onclick="goToStep1()" style="background: transparent; border: 1.5px solid var(--border); box-shadow: none;">
                            Retour
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-content">
            <div class="checkmark">
                <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <h2 class="success-title">Connexion réussie !</h2>
            <p class="success-subtitle">Redirection en cours...</p>
        </div>
    </div>

    <script>
        // Smooth transitions
        function goToStep2(e) {
            e.preventDefault();
            
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const dot1 = document.getElementById('dot1');
            const dot2 = document.getElementById('dot2');
            
            // Animate out step 1
            step1.style.animation = 'fade-out 0.3s cubic-bezier(0.4, 0, 1, 1) forwards';
            
            setTimeout(() => {
                step1.classList.add('hidden');
                step2.classList.remove('hidden');
                step2.style.animation = 'fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                
                // Update dots
                dot1.classList.remove('active');
                dot2.classList.add('active');
                
                // Focus code input
                document.getElementById('code').focus();
            }, 300);
        }

        function goToStep1() {
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const dot1 = document.getElementById('dot1');
            const dot2 = document.getElementById('dot2');
            
            step2.style.animation = 'fade-out 0.3s cubic-bezier(0.4, 0, 1, 1) forwards';
            
            setTimeout(() => {
                step2.classList.add('hidden');
                step1.classList.remove('hidden');
                step1.style.animation = 'fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                
                dot2.classList.remove('active');
                dot1.classList.add('active');
                
                document.getElementById('code').value = '';
            }, 300);
        }

        function login(e) {
            e.preventDefault();
            
            const code = document.getElementById('code').value;
            
            if (code === '1234') {
                document.getElementById('successOverlay').classList.add('show');
                
                setTimeout(() => {
                    alert('Connexion réussie ! Redirection vers /home');
                    location.reload();
                }, 2000);
            } else {
                // Shake animation on error
                const input = document.getElementById('code');
                input.style.animation = 'shake 0.5s';
                setTimeout(() => input.style.animation = '', 500);
                alert('Code incorrect ! Utilisez 1234');
            }
        }

        // Auto-format code input
        document.getElementById('code').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);
        });

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fade-out {
                to {
                    opacity: 0;
                    transform: translateY(-10px);
                }
            }
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
                20%, 40%, 60%, 80% { transform: translateX(8px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
