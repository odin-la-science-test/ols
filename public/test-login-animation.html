<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login Animation - Odin La Science</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
        }

        .container {
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            overflow: hidden;
            position: relative;
        }

        /* Particules animées */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 5s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: all 0.5s;
        }

        .particle.burst {
            animation: particle-burst 1s ease-out forwards;
        }

        @keyframes particle-burst {
            0% { 
                transform: scale(1) translateY(0); 
                opacity: 1;
            }
            100% { 
                transform: scale(3) translateY(-100px); 
                opacity: 0;
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Zone bleue */
        .blue-zone {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            z-index: 1;
            overflow: hidden;
            order: 1;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .blue-zone.slide-right {
            order: 2;
            transform: translateX(0) rotateY(-5deg) scale(1.02);
            box-shadow: -20px 0 60px rgba(0, 0, 0, 0.3);
        }

        .blue-zone::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, 
                transparent 0%, 
                rgba(255,255,255,0.1) 25%, 
                transparent 50%, 
                rgba(255,255,255,0.1) 75%, 
                transparent 100%);
            background-size: 200% 200%;
            animation: wave 3s ease-in-out infinite;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .blue-zone.slide-right::before {
            opacity: 1;
        }

        @keyframes wave {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Effet de brillance rotatif */
        .shine-effect {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .blue-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 2rem;
            animation: logoPulse 3s ease-in-out infinite;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-style: preserve-3d;
        }

        .logo-container.rotate {
            transform: rotateY(720deg) scale(1.2);
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.8));
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes logoZoom {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(180deg); }
            100% { transform: scale(0) rotate(360deg); }
        }

        .logo {
            width: 180px;
            height: 180px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.5));
            transition: all 0.5s;
            position: relative;
        }

        .logo::after {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            opacity: 0;
            animation: logo-shine 3s ease-in-out infinite;
        }

        @keyframes logo-shine {
            0%, 100% { opacity: 0; transform: rotate(0deg); }
            50% { opacity: 1; transform: rotate(180deg); }
        }
            font-size: 4rem;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.5));
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            color: white;
            margin-bottom: 1rem;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .security-icons {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            animation: fadeInUp 0.6s ease-out;
        }

        .security-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1); 
                box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            }
            50% { 
                transform: scale(1.05); 
                box-shadow: 0 6px 25px rgba(16, 185, 129, 0.6);
            }
        }

        /* Zone formulaire */
        .form-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 3rem 2rem;
            position: relative;
            z-index: 2;
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(20px);
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            order: 2;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .form-zone.slide-left {
            order: 1;
            transform: translateX(0) rotateY(5deg) scale(1.02);
            box-shadow: 20px 0 60px rgba(0, 0, 0, 0.3);
        }

        .form-zone::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, 
                rgba(102, 126, 234, 0.1) 0%, 
                transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .form-zone.slide-left::after {
            opacity: 1;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }

        .form-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        .form-container.step-1 {
            animation: fadeIn 0.8s ease-out;
        }

        .form-container.step-2 {
            animation: slideInRight 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes fadeInDown {
            from { 
                opacity: 0; 
                transform: translateY(-30px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes slideInRight {
            from { 
                opacity: 0; 
                transform: translateX(50px); 
            }
            to { 
                opacity: 1; 
                transform: translateX(0); 
            }
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
            animation: fadeInDown 0.6s ease-out;
        }

        .form-icon {
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            font-size: 1.5rem;
        }

        .form-icon.green {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .form-subtitle {
            color: rgba(255,255,255,0.6);
            margin-bottom: 2rem;
            font-size: 0.9rem;
            animation: fadeInDown 0.6s ease-out 0.1s backwards;
        }

        .form-group {
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.6s ease-out 0.2s backwards;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: white;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            borderRadius: 12px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.3s;
            outline: none;
            font-family: inherit;
            position: relative;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3), 0 0 40px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
        }

        input:focus::placeholder {
            transform: translateX(10px);
            opacity: 0.5;
        }

        input.code-input {
            font-size: 2.5rem;
            text-align: center;
            letter-spacing: 1.5rem;
            font-weight: 700;
            padding: 1.5rem;
        }

        input.code-input:focus {
            border-color: #10b981;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
        }

        button {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            animation: fadeInUp 0.6s ease-out 0.4s backwards;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6), 0 0 40px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        button.green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        button.green:hover {
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }

        button.secondary {
            background: transparent;
            color: rgba(255,255,255,0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: none;
            margin-top: 1rem;
        }

        button.secondary:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
            box-shadow: none;
        }

        /* Animation de succès */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 185, 129, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.5s ease-out;
        }

        .success-overlay.show {
            display: flex;
        }

        .success-content {
            animation: successZoom 1s ease-out;
        }

        @keyframes successZoom {
            0% { 
                transform: scale(0) rotate(-180deg); 
                opacity: 0;
            }
            50% { 
                transform: scale(1.1) rotate(10deg); 
            }
            100% { 
                transform: scale(1) rotate(0deg); 
                opacity: 1;
            }
        }

        .checkmark-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .checkmark {
            width: 60px;
            height: 60px;
            stroke: #10b981;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .checkmark path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: checkmark 0.8s ease-out 0.3s forwards;
        }

        @keyframes checkmark {
            to { stroke-dashoffset: 0; }
        }

        .success-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            text-align: center;
            margin-bottom: 1rem;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .success-subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
            text-align: center;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Particules -->
        <script>
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = (5 + Math.random() * 5) + 's';
                document.querySelector('.container').appendChild(particle);
            }
        </script>

        <!-- Zone bleue -->
        <div class="blue-zone" id="blueZone">
            <div class="shine-effect"></div>
            <div class="blue-content">
                <div class="logo-container" id="logoContainer">
                    <div class="logo">🔬</div>
                </div>
                <h1>Odin La Science</h1>
                <p class="subtitle" id="subtitle">Plateforme scientifique complète</p>
                <div class="security-icons hidden" id="securityIcons">
                    <div class="security-icon">🛡️</div>
                    <div class="security-icon">✨</div>
                    <div class="security-icon">🔒</div>
                </div>
            </div>
        </div>

        <!-- Zone formulaire -->
        <div class="form-zone" id="formZone">
            <!-- Étape 1 : Identifiants -->
            <div class="form-container step-1" id="step1">
                <div class="form-header">
                    <div class="form-icon">🛡️</div>
                    <h2>Connexion sécurisée</h2>
                </div>
                <p class="form-subtitle">Étape 1/2 : Identifiants</p>

                <div class="form-group">
                    <label>Email</label>
                    <input type="text" id="email" placeholder="votre.email@ols.com" value="ethan@ols.com">
                </div>

                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" value="ethan123">
                </div>

                <button onclick="goToStep2()">
                    Continuer →
                </button>
            </div>

            <!-- Étape 2 : Code de sécurité -->
            <div class="form-container step-2 hidden" id="step2">
                <div class="form-header">
                    <div class="form-icon green">🔒</div>
                    <h2>Code de sécurité</h2>
                </div>
                <p class="form-subtitle">Étape 2/2 : Authentification à deux facteurs</p>

                <div class="form-group">
                    <label>Code de sécurité (4 chiffres)</label>
                    <input type="text" id="code" class="code-input" placeholder="••••" maxlength="4">
                    <p style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 0.5rem; text-align: center;">
                        Entrez le code de sécurité à 4 chiffres (1234)
                    </p>
                </div>

                <button class="green" onclick="login()">
                    ⚡ Se connecter
                </button>

                <button class="secondary" onclick="goToStep1()">
                    ← Retour
                </button>
            </div>
        </div>

        <!-- Animation de succès -->
        <div class="success-overlay" id="successOverlay">
            <div class="success-content">
                <div class="checkmark-circle">
                    <svg class="checkmark" viewBox="0 0 24 24">
                        <path d="M20 6L9 17L4 12"/>
                    </svg>
                </div>
                <h2 class="success-title">Connexion réussie !</h2>
                <p class="success-subtitle">Redirection en cours...</p>
            </div>
        </div>
    </div>

    <script>
        // Animation des particules lors du clic
        function animateParticles() {
            const particles = document.querySelectorAll('.particle');
            particles.forEach((particle, index) => {
                setTimeout(() => {
                    particle.classList.add('burst');
                    setTimeout(() => particle.classList.remove('burst'), 1000);
                }, index * 20);
            });
        }

        function goToStep2() {
            // Animation des particules
            animateParticles();

            // Animation : la zone bleue passe à droite, le formulaire à gauche
            setTimeout(() => {
                document.getElementById('blueZone').classList.add('slide-right');
                document.getElementById('formZone').classList.add('slide-left');
                document.getElementById('logoContainer').classList.add('rotate');
                document.getElementById('subtitle').textContent = 'Authentification à deux facteurs';
                document.getElementById('securityIcons').classList.remove('hidden');
            }, 300);

            // Changer le formulaire
            setTimeout(() => {
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('code').focus();
            }, 800);
        }

        function goToStep1() {
            // Réinitialiser les positions
            document.getElementById('blueZone').classList.remove('slide-right');
            document.getElementById('formZone').classList.remove('slide-left');
            document.getElementById('logoContainer').classList.remove('rotate');
            document.getElementById('subtitle').textContent = 'Plateforme scientifique complète';
            document.getElementById('securityIcons').classList.add('hidden');

            // Changer le formulaire
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('code').value = '';
        }

        function login() {
            const code = document.getElementById('code').value;
            if (code === '1234') {
                // Afficher l'animation de succès
                document.getElementById('successOverlay').classList.add('show');

                // Simuler la redirection
                setTimeout(() => {
                    alert('Connexion réussie ! Dans l\'application réelle, vous seriez redirigé vers /home');
                    location.reload();
                }, 2000);
            } else {
                alert('Code incorrect ! Utilisez 1234');
            }
        }

        // Permettre Enter pour soumettre
        document.getElementById('email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') goToStep2();
        });

        document.getElementById('code').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.value.length === 4) login();
        });

        // Auto-format du code (seulement des chiffres)
        document.getElementById('code').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);
        });
    </script>
</body>
</html>
