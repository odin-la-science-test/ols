<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
</head>
<body>
    <h1>Test de connexion</h1>
    <script>
        // Test TimingSafeComparison
        class TimingSafeComparison {
            static compare(a, b) {
                if (a.length !== b.length) {
                    let dummy = 0;
                    for (let i = 0; i < Math.max(a.length, b.length); i++) {
                        dummy |= (a.charCodeAt(i % a.length) ^ b.charCodeAt(i % b.length));
                    }
                    return false;
                }

                let result = 0;
                for (let i = 0; i < a.length; i++) {
                    result |= a.charCodeAt(i) ^ b.charCodeAt(i);
                }
                return result === 0;
            }
        }

        // Test
        const email = 'ethan@OLS.com';
        const password = 'ethan123';
        
        const accounts = [
            { email: 'ethan@OLS.com', password: 'ethan123', role: 'super_admin', name: 'Ethan' }
        ];

        let account = null;
        for (const acc of accounts) {
            console.log('Comparing:', acc.email.toLowerCase(), '===', email.toLowerCase(), '?', acc.email.toLowerCase() === email.toLowerCase());
            console.log('Password compare:', TimingSafeComparison.compare(acc.password, password));
            
            if (acc.email.toLowerCase() === email.toLowerCase() && 
                TimingSafeComparison.compare(acc.password, password)) {
                account = acc;
                break;
            }
        }

        if (account) {
            document.body.innerHTML += '<p style="color: green;">✓ Connexion réussie!</p>';
            console.log('Account found:', account);
        } else {
            document.body.innerHTML += '<p style="color: red;">✗ Identifiants incorrects</p>';
        }
    </script>
</body>
</html>
